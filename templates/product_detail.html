<!DOCTYPE html>
<html>
<head>
    <title>{{ product[1] }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 60px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: #ffffff;
            padding: 50px;
            border-radius: 10px;
            display: flex;
            gap: 50px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .image-section img {
            width: 500px;
            border-radius: 8px;
            object-fit: cover;
            cursor: zoom-in;
            transition: 0.3s ease;
        }

        .info-section {
            flex: 1;
        }

        .info-section h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        .brand {
            color: #777;
            margin-bottom: 15px;
        }

        .price {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .stock {
            margin-bottom: 20px;
        }

        .category {
            margin-bottom: 30px;
            color: #555;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s ease;
        }

        .back-btn:hover {
            background: #555;
        }

        /* IMAGE MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .modal-content {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }
    </style>

    <script>
        function openModal(src) {
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("modalImage");

            modal.style.display = "flex";
            modalImg.src = src;
        }

        function closeModal() {
            const modal = document.getElementById("imageModal");
            modal.style.display = "none";
        }
    </script>
</head>
<body>

<div class="container">
    <div class="image-section">
        <img 
            src="{{ url_for('static', filename='images/' + product[4]) }}" 
            alt="{{ product[1] }}"
            onclick="openModal(this.src)"
        >
    </div>

    <div class="info-section">
        <h1>{{ product[1] }}</h1>
        <div class="brand">Brand: {{ product[5] }}</div>
        <div class="price">$ {{ product[2] }}</div>
        <div class="stock">Stock Available: {{ product[3] }}</div>
        <div class="category">Category: {{ product[6] }}</div>

        <a href="{{ url_for('shop', category=product[6]) }}" class="back-btn">
            ← Back to Shop
        </a>
    </div>
</div>

<!-- FULLSCREEN IMAGE MODAL -->
<div id="imageModal" class="modal" onclick="closeModal()">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="modalImage">
</div>

</body>
</html>
